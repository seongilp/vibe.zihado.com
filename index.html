<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>바이브 코딩 쇼케이스 — AI와 함께 만든 것들</title>
<meta name="description" content="AI와 짝을 이뤄 만든 30여 개의 작은 프로젝트. 동네 주민 코딩 교육용 포트폴리오.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root{
    --bg:#FFFFFF;
    --fg:#111827;
    --blue:#3B82F6;   --blue-d:#2563EB;  --blue-50:#EFF6FF;  --blue-100:#DBEAFE;
    --emerald:#10B981;--emerald-d:#059669;--emerald-50:#ECFDF5;--emerald-100:#D1FAE5;
    --amber:#F59E0B;  --amber-d:#D97706; --amber-50:#FFFBEB; --amber-100:#FEF3C7;
    --muted:#F3F4F6;  --muted-2:#E5E7EB; --gray-500:#6B7280;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:'Outfit','Pretendard',-apple-system,sans-serif;font-weight:400;
    background:var(--bg);color:var(--fg);line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden;
  }
  .wrap{max-width:1200px;margin:0 auto;padding:0 24px}
  .full{width:100%}
  ::selection{background:var(--amber);color:#fff}
  h1,h2,h3,h4{font-weight:800;letter-spacing:-.02em;line-height:1.05}

  /* ---------- HERO (blue color block) ---------- */
  .hero{background:var(--blue);color:#fff;position:relative;overflow:hidden;padding:72px 0 80px}
  .hero .deco{position:absolute;pointer-events:none;border-radius:50%}
  .hero .d1{width:520px;height:520px;background:#fff;opacity:.07;top:-160px;right:-120px}
  .hero .d2{width:300px;height:300px;background:#fff;opacity:.06;bottom:-120px;left:-80px}
  .hero .d3{position:absolute;width:200px;height:200px;background:#fff;opacity:.05;
    top:40px;left:38%;border-radius:18px;transform:rotate(25deg);pointer-events:none}
  .hero-inner{position:relative;z-index:1;display:grid;grid-template-columns:1.45fr 1fr;gap:40px;align-items:center}
  .kicker{display:inline-block;background:rgba(255,255,255,.16);color:#fff;font-weight:600;
    text-transform:uppercase;letter-spacing:.12em;font-size:.78rem;padding:8px 14px;border-radius:6px}
  .hero h1{font-size:clamp(2.6rem,7vw,5rem);margin:22px 0 0}
  .hero h1 .amber{color:var(--amber)}
  .hero .sub{font-size:clamp(1.05rem,2.2vw,1.3rem);font-weight:400;max-width:560px;margin-top:22px;color:rgba(255,255,255,.92)}
  .statcards{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .sc{background:#fff;border-radius:12px;padding:20px}
  .sc .n{font-family:'Outfit';font-weight:800;font-size:2.6rem;line-height:1;letter-spacing:-.03em}
  .sc .l{font-weight:600;font-size:.85rem;color:var(--gray-500);margin-top:6px}
  .sc.b .n{color:var(--blue)} .sc.e .n{color:var(--emerald)} .sc.a .n{color:var(--amber)} .sc.g .n{color:var(--fg)}
  .sc.wide{grid-column:1 / -1}

  /* ---------- FILTER ---------- */
  .filters{position:sticky;top:0;z-index:30;background:#fff;border-bottom:2px solid var(--muted-2);padding:14px 0}
  .filters-inner{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
  .chip{font-family:inherit;font-weight:600;cursor:pointer;border:none;background:var(--muted);color:var(--fg);
    padding:9px 16px;border-radius:8px;font-size:.92rem;transition:all .2s ease}
  .chip:hover{background:var(--muted-2);transform:scale(1.04)}
  .chip.active{background:var(--blue);color:#fff}
  .chip:focus-visible{outline:none;box-shadow:0 0 0 3px #fff,0 0 0 5px var(--blue)}

  /* ---------- CATEGORY ---------- */
  .catalog{padding:20px 0 0}
  .cat{padding:48px 0 4px}
  .cat-label{display:inline-flex;align-items:center;gap:8px;font-weight:600;text-transform:uppercase;
    letter-spacing:.1em;font-size:.78rem;color:#fff;padding:7px 13px;border-radius:6px}
  .cat-label .em{font-size:1rem}
  .cat-head{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin:16px 0 6px}
  .cat-title{font-size:clamp(1.6rem,4vw,2.4rem)}
  .cat-count{font-family:'Outfit';font-weight:800;font-size:1.1rem}
  .cat-blurb{color:var(--gray-500);max-width:780px;font-size:1rem;margin-bottom:26px}

  /* ---------- CARDS (flat color blocks) ---------- */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}
  .card{border-radius:12px;padding:24px;display:flex;flex-direction:column;cursor:default;
    transition:transform .2s ease, background .2s ease}
  .card:hover{transform:scale(1.02)}
  .card .topbar{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .card .dot{width:34px;height:34px;border-radius:8px;flex:none;display:grid;place-items:center;color:#fff;font-weight:800;font-family:'Outfit';font-size:.9rem}
  .card .folder{font-family:'Outfit';font-weight:500;font-size:.78rem;color:var(--gray-500)}
  .card h3{font-size:1.3rem;margin-bottom:8px}
  .card .one{font-weight:500;font-size:.95rem;margin-bottom:14px}
  .card .does{list-style:none;margin:0 0 16px;display:flex;flex-direction:column;gap:7px}
  .card .does li{font-size:.88rem;color:#374151;padding-left:20px;position:relative;line-height:1.45}
  .card .does li::before{content:"";position:absolute;left:2px;top:.55em;width:8px;height:8px;border-radius:2px}
  .stack{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
  .tag{font-family:'Outfit';font-weight:500;font-size:.74rem;background:#fff;color:#374151;
    padding:3px 9px;border-radius:6px}
  .learn{margin-top:auto;background:#fff;border-radius:10px;padding:14px 16px}
  .learn .lh{font-weight:700;font-size:.92rem;margin-bottom:8px}
  .learn ul{list-style:none;display:flex;flex-direction:column;gap:6px}
  .learn li{font-size:.84rem;color:#374151;padding-left:20px;position:relative;line-height:1.4}
  .learn li::before{content:"+";position:absolute;left:2px;font-weight:800}
  .card-foot{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:16px;flex-wrap:wrap}
  .status{font-family:'Outfit';font-weight:600;font-size:.74rem;text-transform:uppercase;letter-spacing:.05em;
    padding:5px 10px;border-radius:6px;color:#fff}
  .status.working{background:var(--emerald)}
  .status.prototype,.status.wip{background:var(--amber)}
  .status.proposal{background:var(--blue)}
  .live{font-family:'Outfit';font-weight:600;font-size:.8rem;text-decoration:none;color:#fff;
    padding:6px 11px;border-radius:6px;transition:all .2s ease}
  .live:hover{transform:scale(1.05)}
  .live::before{content:"↗ "}

  /* card color variants */
  .v-blue{background:var(--blue-50)} .v-blue:hover{background:var(--blue-100)}
  .v-blue .dot{background:var(--blue)} .v-blue .does li::before{background:var(--blue)}
  .v-blue .learn li::before{color:var(--blue)} .v-blue .live{background:var(--blue)}
  .v-emerald{background:var(--emerald-50)} .v-emerald:hover{background:var(--emerald-100)}
  .v-emerald .dot{background:var(--emerald)} .v-emerald .does li::before{background:var(--emerald)}
  .v-emerald .learn li::before{color:var(--emerald)} .v-emerald .live{background:var(--emerald)}
  .v-amber{background:var(--amber-50)} .v-amber:hover{background:var(--amber-100)}
  .v-amber .dot{background:var(--amber)} .v-amber .does li::before{background:var(--amber)}
  .v-amber .learn li::before{color:var(--amber-d)} .v-amber .live{background:var(--amber-d)}

  /* ---------- LESSONS (dark color block) ---------- */
  .lessons{background:var(--fg);color:#fff;padding:72px 0;margin-top:72px}
  .lessons h2{font-size:clamp(1.9rem,5vw,3rem);text-align:center}
  .lessons h2 .amber{color:var(--amber)}
  .lessons .lead{text-align:center;font-weight:400;color:rgba(255,255,255,.7);max-width:560px;margin:14px auto 40px}
  .lgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px}
  .lesson{background:#1F2937;border-radius:12px;padding:24px;transition:transform .2s ease}
  .lesson:hover{transform:scale(1.02)}
  .lesson .ln{font-family:'Outfit';font-weight:800;font-size:2.2rem;line-height:1}
  .lesson:nth-child(3n+1) .ln{color:var(--blue)}
  .lesson:nth-child(3n+2) .ln{color:var(--emerald)}
  .lesson:nth-child(3n) .ln{color:var(--amber)}
  .lesson h4{font-size:1.2rem;margin:8px 0 8px}
  .lesson p{font-size:.88rem;font-weight:400;color:rgba(255,255,255,.75);line-height:1.5}

  /* ---------- CTA + FOOTER ---------- */
  .cta{background:var(--amber);color:var(--fg);padding:64px 0;position:relative;overflow:hidden}
  .cta .deco{position:absolute;width:360px;height:360px;border-radius:50%;background:#fff;opacity:.12;
    top:-120px;right:-80px;pointer-events:none}
  .cta-inner{position:relative;z-index:1;text-align:center}
  .cta h2{font-size:clamp(1.6rem,4.5vw,2.6rem);max-width:760px;margin:0 auto}
  footer{background:var(--fg);color:rgba(255,255,255,.6);padding:30px 0;text-align:center}
  footer .small{font-family:'Outfit';font-weight:500;text-transform:uppercase;letter-spacing:.1em;font-size:.78rem}

  .loading,.errbox{text-align:center;padding:80px 24px;font-weight:500}
  .errbox code{background:var(--muted);padding:2px 7px;border-radius:5px;font-family:'Outfit'}

  .reveal{opacity:0;transform:translateY(16px)}
  .reveal.in{opacity:1;transform:none;transition:opacity .4s ease, transform .4s ease}

  @media(max-width:760px){
    .hero-inner{grid-template-columns:1fr;gap:30px}
    .hero{padding:54px 0 60px}
  }
  @media(prefers-reduced-motion:reduce){ .reveal{opacity:1;transform:none} }
</style>
</head>
<body>

  <!-- HERO -->
  <section class="hero full">
    <span class="deco d1"></span><span class="deco d2"></span><span class="d3"></span>
    <div class="wrap hero-inner">
      <div>
        <span class="kicker">동네 코딩 교실 · 포트폴리오</span>
        <h1>바이브 코딩<br><span class="amber">쇼케이스</span></h1>
        <p class="sub" id="sub"></p>
      </div>
      <div class="statcards" id="statcards"></div>
    </div>
  </section>

  <!-- FILTER -->
  <nav class="filters">
    <div class="wrap"><div class="filters-inner" id="filters"></div></div>
  </nav>

  <!-- CATALOG -->
  <div class="wrap catalog"><main id="catalog"><div class="loading">프로젝트 불러오는 중…</div></main></div>

  <!-- LESSONS -->
  <section class="lessons full reveal"><div class="wrap" id="lessons"></div></section>

  <!-- CTA -->
  <section class="cta full">
    <span class="deco"></span>
    <div class="wrap cta-inner">
      <h2>거창하지 않아도, 직접 굴러가는 걸 만드는 게 코딩의 시작입니다.</h2>
    </div>
  </section>

  <footer><div class="wrap"><p class="small">made with ❤️ and claude - <span id="count2"></span> PROJECT - 2026</p></div></footer>

<script>
const VARS = ['v-blue','v-emerald','v-amber'];
const LABEL_BG = ['var(--blue)','var(--emerald)','var(--amber-d)'];
const STATUS_LABEL = {working:'돌아가는 중',prototype:'프로토타입',wip:'개발 중',proposal:'제안서'};

function el(tag, cls, html){const e=document.createElement(tag); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e;}

function card(p, variant, idx){
  const c = el('div','card reveal '+variant);
  c.dataset.cat = p._cat;
  const top = el('div','topbar');
  const dot = el('div','dot', (idx+1)); top.appendChild(dot);
  top.appendChild(el('span','folder', p.folder));
  c.appendChild(top);
  c.appendChild(el('h3', null, p.name));
  c.appendChild(el('p','one', p.oneLiner));
  const ul = el('ul','does'); (p.does||[]).forEach(d => ul.appendChild(el('li',null,d))); c.appendChild(ul);
  const st = el('div','stack'); (p.stack||[]).forEach(s => st.appendChild(el('span','tag',s))); c.appendChild(st);
  const learn = el('div','learn');
  learn.appendChild(el('div','lh','🎓 배울 수 있는 것'));
  const lu = el('ul'); (p.learn||[]).forEach(l => lu.appendChild(el('li',null,l))); learn.appendChild(lu);
  c.appendChild(learn);
  const foot = el('div','card-foot');
  foot.appendChild(el('span','status '+(p.status||'working'), STATUS_LABEL[p.status]||p.status));
  if(p.live){ const a=el('a','live', p.live.replace(/^https?:\/\//,'')); a.href=p.live; a.target='_blank'; a.rel='noopener'; foot.appendChild(a); }
  c.appendChild(foot);
  return c;
}

function render(data){
  const total = data.categories.reduce((n,c)=>n+c.projects.length,0);
  const working = data.categories.reduce((a,c)=>a+c.projects.filter(p=>p.status==='working').length,0);
  document.getElementById('count2').textContent = total;
  document.getElementById('sub').innerHTML =
    'AI와 짝을 이뤄 만든 30여 개의 작은 프로젝트. 웹·앱·자동화·보안까지, 직접 굴러가는 것들만 모았습니다.';

  document.getElementById('statcards').innerHTML =
    '<div class="sc b"><div class="n">'+total+'</div><div class="l">개의 프로젝트</div></div>'+
    '<div class="sc e"><div class="n">'+data.categories.length+'</div><div class="l">개 분야</div></div>'+
    '<div class="sc a"><div class="n">'+working+'</div><div class="l">실제 작동 중</div></div>'+
    '<div class="sc g"><div class="n">∞</div><div class="l">배울 거리</div></div>';

  const filters = document.getElementById('filters');
  const all = el('button','chip active','✺ 전체'); all.dataset.cat='all'; filters.appendChild(all);
  data.categories.forEach(c=>{ const b=el('button','chip', c.emoji+' '+c.name); b.dataset.cat=c.id; filters.appendChild(b); });

  const cat = document.getElementById('catalog'); cat.innerHTML='';
  data.categories.forEach((c,ci)=>{
    const variant = VARS[ci%VARS.length];
    const sec = el('section','cat'); sec.dataset.cat = c.id;
    const lab = el('span','cat-label','<span class="em">'+c.emoji+'</span> '+c.name);
    lab.style.background = LABEL_BG[ci%LABEL_BG.length];
    sec.appendChild(lab);
    const head = el('div','cat-head');
    head.appendChild(el('h2','cat-title', c.name));
    head.appendChild(el('span','cat-count', c.projects.length+'개'));
    sec.appendChild(head);
    sec.appendChild(el('p','cat-blurb', c.blurb));
    const grid = el('div','grid');
    c.projects.forEach((p,pi)=>{ p._cat=c.id; grid.appendChild(card(p, variant, pi)); });
    sec.appendChild(grid);
    cat.appendChild(sec);
  });

  const L = document.getElementById('lessons');
  L.appendChild(el('h2','','여러분이 <span class="amber">배울 수 있는 것</span>'));
  L.appendChild(el('p','lead','작은 프로젝트 하나하나가 코딩의 다른 근육을 길러줍니다.'));
  const lg = el('div','lgrid');
  (data.lessons||[]).forEach((les,i)=>{
    const d=el('div','lesson reveal');
    d.appendChild(el('div','ln', String(i+1).padStart(2,'0')));
    d.appendChild(el('h4',null,les.title));
    d.appendChild(el('p',null,les.body));
    lg.appendChild(d);
  });
  L.appendChild(lg);

  setupFilter(); setupReveal();
}

function setupFilter(){
  const chips=[...document.querySelectorAll('.chip')];
  const sections=[...document.querySelectorAll('.cat')];
  chips.forEach(ch=>ch.addEventListener('click',()=>{
    chips.forEach(c=>c.classList.remove('active')); ch.classList.add('active');
    const t=ch.dataset.cat;
    sections.forEach(s=>{ s.style.display = (t==='all'||s.dataset.cat===t)?'':'none'; });
    window.scrollTo({top: document.querySelector('.filters').offsetTop, behavior:'smooth'});
  }));
}
function setupReveal(){
  const io=new IntersectionObserver(es=>{ es.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target);} }); },{threshold:.06});
  document.querySelectorAll('.reveal').forEach((r,i)=>{ r.style.transitionDelay=(Math.min(i,6)*40)+'ms'; io.observe(r); });
}

fetch('./projects.json')
  .then(r=>{ if(!r.ok) throw new Error(r.status); return r.json(); })
  .then(render)
  .catch(err=>{
    document.getElementById('catalog').innerHTML =
      '<div class="errbox">데이터를 불러오지 못했어요. <code>npx serve</code> 로 띄우거나 Cloudflare Pages에 배포하세요. <small>('+err+')</small></div>';
  });
</script>
</body>
</html>
